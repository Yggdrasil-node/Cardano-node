# Wave 9 PR 26 — lefthook git hooks configuration.
#
# `lefthook` (https://github.com/evilmartians/lefthook) over `pre-commit`:
# single Go binary, no Python virtualenv, ~5x faster on a workspace
# this size. Aligned with Yggdrasil's pure-Rust (no FFI / no openssl)
# stance — keeps the dev-loop dep surface lean.
#
# Install:
#   curl -fsSL https://github.com/evilmartians/lefthook/releases/latest/download/lefthook_linux_x86_64.tar.gz \
#     | sudo tar -xz -C /usr/local/bin lefthook
#   lefthook install
# Bypass per-invocation:
#   LEFTHOOK=0 git push   # emergency, do not abuse

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt -- --check {staged_files}
      stage_fixed: true
    clippy-changed:
      glob: "*.rs"
      run: |
        # Restrict clippy to the crates whose files changed. Full
        # `cargo lint` runs at pre-push; pre-commit stays sub-2s by
        # scoping to changed crates only.
        crates=$(git diff --cached --name-only --diff-filter=ACM \
                 | awk -F/ '
                   /^crates\/node\/yggdrasil-node\// { print "yggdrasil-node"; next }
                   /^crates\/node\// { print "yggdrasil-node-" $3; next }
                   /^crates\/tools\// { print "yggdrasil-" $3; next }
                   /^crates\// { print "yggdrasil-" $2 }
                 ' \
                 | sort -u)
        for c in $crates; do
          [ -n "$c" ] && cargo clippy -p "$c" --all-targets -- -D warnings || exit 1
        done
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}

pre-push:
  # Mirror every CI gate that runs in `.github/workflows/ci.yml` so a
  # successful `git push` implies (best-effort) green CI. May 2026
  # follow-up: prior to this expansion, only 3 of CI's 9 gates ran
  # at pre-push — multiple slices shipped with red CI (fmt drift,
  # cargo-deny advisory + license, parity-matrix schema enum drift)
  # before anyone noticed. The full mirror keeps that from recurring.
  parallel: false
  commands:
    # Gate 1: workspace-wide rustfmt drift. The pre-commit `fmt`
    # only checks staged files; a rebase that brings in someone
    # else's drift can slip through pre-commit and only surface in
    # CI. The pre-push check is workspace-wide.
    fmt-check:
      run: cargo fmt --all -- --check
    # Gate 2: full nextest run with the `ci` profile so the
    # slow-timeout matches what CI uses (the default profile's
    # 60s × 2 = 120s ceiling trips the vendored-network-presets
    # config-validation test on slow hardware). May 2026 fix.
    test-fast:
      run: cargo nextest run --profile ci --workspace --all-features --no-fail-fast
    # Gate 3: workspace clippy at full strictness (`-D warnings`).
    # The pre-commit `clippy-changed` only lints crates touched by
    # the diff; cross-crate breakage from a `pub` change can slip.
    lint:
      run: cargo lint
    # Gate 4: feature-gated breakage canary. CI runs this with
    # `--no-default-features`; pre-push mirrors that exactly.
    lint-no-default:
      run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
    # Gate 5: strict-mirror drift-guard. Walks production .rs files
    # and verifies each has either an upstream .hs mirror or a
    # `## Naming parity` stanza ending in `**Strict mirror:** none.`
    parity-mirror:
      run: python3 scripts/check-strict-mirror.py --fail-on-violation
    # Gate 6: parity-matrix schema + on-disk-paths validator.
    parity-matrix:
      run: python3 scripts/check-parity-matrix.py
    # Gate 7: JSON-schema validator for parity-matrix.json. The
    # CI workflow installs check-jsonschema on the fly; we use a
    # best-effort `python3 -m check_jsonschema` here so devs who
    # haven't installed it locally get a clear skip message rather
    # than a confusing failure.
    parity-matrix-schema:
      run: |
        if python3 -c 'import check_jsonschema' 2>/dev/null; then
          python3 -m check_jsonschema --schemafile docs/parity-matrix.schema.json docs/parity-matrix.json
        else
          echo "[pre-push] skip: check-jsonschema not installed; CI will catch this. (pip install check-jsonschema to enable.)"
        fi
    # Gate 8: cardano-base fixture-manifest pin validator.
    parity-fixtures:
      run: python3 scripts/check-fixture-manifest.py
    # Gate 9: supply-chain (cargo-deny). Best-effort — skip with
    # a warning when the binary isn't installed locally.
    deny:
      run: |
        if command -v cargo-deny >/dev/null 2>&1; then
          cargo deny check
        else
          echo "[pre-push] skip: cargo-deny not installed; CI will catch this. (cargo install --locked cargo-deny to enable.)"
        fi
