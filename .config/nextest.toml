# Wave 9 PR 25 — cargo-nextest configuration.
#
# Profiles map to local + CI workflows. The `default` profile is what
# `just test-fast` invokes; `ci` is what `.github/workflows/ci.yml`
# invokes (Wave 1 PR 2 swapped the workflow from `cargo test-all` to
# `cargo nextest run --profile ci`).
#
# `[[profile.default.overrides]]` flags the integration tests that
# own ports / fixture dirs / tokio runtimes as `serial-heavy`; the
# `serial-heavy` test-group caps concurrency to 1 so the heavy
# integration suites don't trip each other.

[profile.default]
retries = 0
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = true
test-threads = "num-cpus"

[profile.ci]
retries = 2
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 3 }
junit = { path = "target/nextest/ci/junit.xml" }

[profile.slow]
retries = 0
slow-timeout = { period = "10m", terminate-after = 1 }

# Heavy integration suites with shared external state (ports, fixture
# dirs, tokio runtimes). Each one drives a substantial slice of the
# stack; running them in parallel produces port-collision flakes.
[[profile.default.overrides]]
filter = 'test(=integration) | test(=mempool_integration) | test(=sync) | test(=runtime) | test(=local_ntc)'
test-group = "serial-heavy"
slow-timeout = { period = "5m", terminate-after = 1 }

[[profile.ci.overrides]]
filter = 'test(=integration) | test(=mempool_integration) | test(=sync) | test(=runtime) | test(=local_ntc)'
test-group = "serial-heavy"
slow-timeout = { period = "10m", terminate-after = 2 }

[test-groups]
serial-heavy = { max-threads = 1 }
