[workspace]
members = [
    "crates/crypto",
    "crates/consensus",
    "crates/ledger",
    "crates/network",
    "crates/storage",
    "crates/mempool",
    "crates/cddl-codegen",
    "node",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "Apache-2.0"
rust-version = "1.85"
version = "0.1.0"

[workspace.dependencies]
blake2 = "0.10.6"
curve25519-dalek = { version = "4.1.3", default-features = true }
ed25519-dalek = { version = "2.1.1", default-features = true }
eyre = "0.6.12"
serde = { version = "1.0.219", features = ["derive"] }
sha2 = "0.10.8"
subtle = "2.6.1"
thiserror = "2.0.12"
tokio = { version = "1.44.1", features = ["macros", "rt-multi-thread", "sync", "time"] }

yggdrasil-consensus = { path = "crates/consensus" }
yggdrasil-crypto = { path = "crates/crypto" }
yggdrasil-ledger = { path = "crates/ledger" }
yggdrasil-mempool = { path = "crates/mempool" }
yggdrasil-network = { path = "crates/network" }
yggdrasil-storage = { path = "crates/storage" }

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"

[profile.dev.package.yggdrasil-crypto]
opt-level = 3

[profile.test.package.yggdrasil-crypto]
opt-level = 3
