title: Yggdrasil — Pure Rust Cardano Node
description: Installation, configuration, operation, and maintenance manual for the Yggdrasil Cardano node.

# Theme — Just-the-Docs via remote theme so GitHub Pages doesn't need
# the gem in its build path. The matching plugin must be enabled below.
remote_theme: just-the-docs/just-the-docs

# Plugins required for `remote_theme:` to take effect on GitHub Pages.
# `jekyll-include-cache` is needed by just-the-docs internally.
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache

# Site URL is set by the workflow at deploy time via --baseurl;
# explicit defaults here keep `bundle exec jekyll serve` working
# locally too. For a GitHub Project Pages site at
# https://<org>.github.io/<repo>/ the baseurl is "/<repo>".
url: ""
baseurl: "/Cardano-node"

permalink: pretty

# Repository attribution displayed by the just-the-docs footer + edit-this-page link.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/yggdrasil-node/Cardano-node"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Theme settings
#
# `color_scheme: yggdrasil` is our dark brand scheme defined in
# `_sass/color_schemes/yggdrasil.scss`.  It does not toggle to light;
# the site is dark-only by design (matches the YggdrasilNode logo).
color_scheme: yggdrasil

# Sidebar / page-header logo — shown above the site title in the
# just-the-docs sidebar.  Wide banner shipped separately for the
# landing page hero (see `_includes/header_custom.html` once present
# on a page that opts in via `hero: true` in front matter).
logo: "/assets/images/Yggrasil_logo.png"

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true
enable_copy_code_button: true

# Just-the-Docs callouts — referenced as `{: .callout-info }` etc. on
# block paragraphs.
callouts_level: quiet
callouts:
  info:
    title: Note
    color: blue
  tip:
    title: Tip
    color: yellow
  warning:
    title: Warning
    color: red
  success:
    title: Verified
    color: green

# Footer.
footer_content: 'Yggdrasil — a pure-Rust Cardano node, targeting upstream IntersectMBO Haskell parity. Source: <a href="https://github.com/yggdrasil-node/Cardano-node">github.com/yggdrasil-node/Cardano-node</a>.'

# Top-right auxiliary links.
aux_links:
  "GitHub":
    - "https://github.com/yggdrasil-node/Cardano-node"
aux_links_new_tab: true

# Files and directories to exclude from the rendered site.
exclude:
  - AGENTS.md
  - "*/AGENTS.md"
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .jekyll-cache/
