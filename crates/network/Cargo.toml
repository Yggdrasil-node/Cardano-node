yggdrasil-ledger.workspace = true

[dev-dependencies]
hex.workspace = true
tempfile = "3"

# ──────────────────────────────────────────────────────────────────────
# Wave 3 PR 5 — feature-flag declarations.
#
# Reserved hooks for Wave 5 PR 11 and Wave 8 PR 22:
#   * `ntn`           — Node-to-Node mini-protocols (default).
#                       Sister tools that only need the local socket
#                       surface (cardano-submit-api, kes-agent-control)
#                       opt out by depending on this crate with
#                       `default-features = false, features = ["ntc"]`.
#   * `ntc`           — Node-to-Client mini-protocols (default).
#                       Required by every sister tool that talks to
#                       a running yggdrasil-node.
#   * `serde-traces`  — was intended to gate `serde::Serialize`
#                       derives on trace-event types so the
#                       cardano-tracer forwarder layer could emit
#                       them over the Unix socket.
#
# All three are default-on; the default build is byte-identical with
# or without them. As of the Phase 5.4 audit (2026-05) all three
# remain **decorative** — no `#[cfg(feature = "...")]` gates
# reference them:
#   * `ntn` / `ntc` — wiring these means gating whole mini-protocol
#     module trees; large but mechanically tractable, deferred.
#   * `serde-traces` — premise drifted: this crate's `serde` derives
#     are on *config* types (`LocalRootConfig`, `PeerAdvertise`,
#     `UseLedgerPeers`, `UseBootstrapPeers`) that are parsed from
#     operator JSON regardless of trace forwarding. There are no
#     standalone trace-event types here deriving `serde` — trace
#     forwarding goes through `crates/telemetry`'s Haskell-JSON
#     formatter, not `serde` on network types. Wiring `serde-traces`
#     needs a re-scope (decide what, if anything, it should gate).
# ──────────────────────────────────────────────────────────────────────
[features]
default = ["ntn", "ntc", "serde-traces"]
ntn = []
ntc = []
serde-traces = []

[lints]
workspace = true
