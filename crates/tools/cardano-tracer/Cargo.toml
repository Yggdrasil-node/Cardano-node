[package]
name = "yggdrasil-cardano-tracer"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream cardano-tracer standalone trace-forwarder + log + metrics aggregator."

# R327 skeleton — bootstrap of the cardano-tracer sister-tool crate per the
# R326–R459 sister-tools port arc plan.
# Upstream source vendored at:
# .reference-haskell-cardano-node/cardano-tracer/

[lints]
workspace = true

[lib]
name = "yggdrasil_cardano_tracer"
path = "src/lib.rs"

[[bin]]
name = "cardano-tracer"
path = "src/main.rs"

[dependencies]
axum = { workspace = true }
axum-server = { workspace = true }
clap = { workspace = true }
eyre = { workspace = true }
lettre = { workspace = true }
maud = { workspace = true }
rustls = { workspace = true }
rustls-pemfile = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
yggdrasil-ledger = { workspace = true }
yggdrasil-network = { workspace = true }

yggdrasil-telemetry.workspace = true
[dev-dependencies]
tempfile = "3"
