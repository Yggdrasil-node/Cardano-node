[package]
name = "yggdrasil-db-truncater"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream db-truncater ChainDB rollback utility."

# R327 skeleton — bootstrap of the db-truncater sister-tool crate per the
# R326–R459 sister-tools port arc plan.
# Upstream source vendored at:
# .reference-haskell-cardano-node/deps/ouroboros-consensus/ouroboros-consensus-cardano/src/unstable-cardano-tools/Cardano/Tools/DBTruncater/

[lints]
workspace = true

[lib]
name = "yggdrasil_db_truncater"
path = "src/lib.rs"

[[bin]]
name = "db-truncater"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
eyre = { workspace = true }
thiserror = { workspace = true }
yggdrasil-ledger = { path = "../../ledger" }
yggdrasil-storage = { path = "../../storage" }

yggdrasil-telemetry.workspace = true
[dev-dependencies]
tempfile = "3"
