[package]
name = "yggdrasil-tx-generator"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream tx-generator transaction-stream load generator. Current surface has byte-equivalent top-level help/version, Command.hs parsing, TestnetDiscovery, NixService high-level config parsing, Compiler.hs script generation, Script/Aeson JSON parsing, Script/Env+Action state execution, StartProtocol config-derived genesis/protocol env wiring, SecureGenesis initial-fund spending, Script/Core state plus NtC query helpers, metadata sizing, wallet queues, value splitting, UTxO output builders, static Plutus context wiring with pre-execution checks, key-spend and script-spend transaction construction, finite submitInEra LocalSocket wiring, json_highlevel execution, selftest DiscardTX execution, and RoundRobin/OneOf upstream-TODO error-shape parity; next work is Plutus autobudget, exact DumpToFile rendering, benchmark submission, and soak evidence."

# R327/R335 skeleton plus R533-R540 command/setup/compiler/script
# mirrors plus R541-R556 GeneratorTx/TxGenerator/Plutus/runtime helper slices. The former cardano-cli CLI-MVS prerequisite is closed;
# tx-generator now needs its own GeneratorTx / Submission implementation
# arc plus upstream comparison evidence.
# Three Calibrate sub-trees (Compiler.hs + Benchmarking/Script/* +
# TxGenerator/PureExample.hs) are pre-approved synthesis carve-outs per
# the same plan.
# Upstream source vendored at:
# .reference-haskell-cardano-node/bench/tx-generator/

[lints]
workspace = true

[lib]
name = "yggdrasil_tx_generator"
path = "src/lib.rs"

[[bin]]
name = "tx-generator"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
eyre = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_norway = { workspace = true }
yggdrasil-telemetry.workspace = true
thiserror = { workspace = true }
hex = { workspace = true }
num-bigint = { workspace = true }
tokio = { workspace = true }
yggdrasil-crypto = { workspace = true }
yggdrasil-ledger = { workspace = true }
yggdrasil-network = { workspace = true }
yggdrasil-node-config = { workspace = true }
yggdrasil-node-genesis = { workspace = true }
yggdrasil-plutus = { workspace = true }
