[package]
name = "yggdrasil-tx-generator"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream tx-generator transaction-stream load generator. Current surface is a byte-equivalent help/version skeleton; the cardano-cli C-arc prerequisite is closed, so the next work is tx-generator parsing, submission, and soak evidence."

# R327 skeleton — bootstrap of the tx-generator sister-tool crate per the
# R326–R459 sister-tools port arc plan. The crate currently ships only
# the lib.rs / main.rs / parser.rs / golden-test surface. The former
# cardano-cli CLI-MVS prerequisite is closed; tx-generator now needs its
# own Command / Setup / Submission implementation arc plus upstream
# comparison evidence.
# Three Calibrate sub-trees (Compiler.hs + Benchmarking/Script/* +
# TxGenerator/PureExample.hs) are pre-approved synthesis carve-outs per
# the same plan.
# Upstream source vendored at:
# .reference-haskell-cardano-node/bench/tx-generator/

[lints]
workspace = true

[lib]
name = "yggdrasil_tx_generator"
path = "src/lib.rs"

[[bin]]
name = "tx-generator"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
eyre = { workspace = true }
yggdrasil-telemetry.workspace = true
thiserror = { workspace = true }
