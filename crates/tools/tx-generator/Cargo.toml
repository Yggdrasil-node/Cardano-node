[package]
name = "yggdrasil-tx-generator"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream tx-generator transaction-stream load generator. Current surface has byte-equivalent top-level help/version, Command.hs parsing, TestnetDiscovery, and NixService high-level config parsing; next work is script compilation, generation, submission, and soak evidence."

# R327/R335 skeleton plus R533-R535 command/setup mirrors. The former
# cardano-cli CLI-MVS prerequisite is closed; tx-generator now needs its
# own Compiler / Script / GeneratorTx / Submission implementation arc plus
# upstream comparison evidence.
# Three Calibrate sub-trees (Compiler.hs + Benchmarking/Script/* +
# TxGenerator/PureExample.hs) are pre-approved synthesis carve-outs per
# the same plan.
# Upstream source vendored at:
# .reference-haskell-cardano-node/bench/tx-generator/

[lints]
workspace = true

[lib]
name = "yggdrasil_tx_generator"
path = "src/lib.rs"

[[bin]]
name = "tx-generator"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
eyre = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
yggdrasil-telemetry.workspace = true
thiserror = { workspace = true }
