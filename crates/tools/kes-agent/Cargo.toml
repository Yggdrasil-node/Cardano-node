[package]
name = "yggdrasil-kes-agent"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream kes-agent KES key custody + period-rotation agent. SKELETON STUB with R443 structured deferral; daemon/socket dispatch resumes at R444+ after upstream socket-protocol byte-equivalence fixture capture."

# R327 skeleton + R443 structured deferral for the kes-agent sister-tool
# crate. The crate currently ships the lib.rs / main.rs / parser.rs /
# golden-test surface plus a programmatic daemon-status descriptor; the
# operational port (start / stop / restart / status / run subcommands +
# KES key lifecycle wiring) resumes in the R444+ daemon/socket follow-on
# after upstream socket-protocol byte-equivalence fixtures are captured.
# Upstream source vendored at:
# .reference-haskell-cardano-node/deps/kes-agent/kes-agent/

[lints]
workspace = true

[lib]
name = "yggdrasil_kes_agent"
path = "src/lib.rs"

[[bin]]
name = "kes-agent"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
eyre = { workspace = true }
yggdrasil-telemetry.workspace = true
thiserror = { workspace = true }
