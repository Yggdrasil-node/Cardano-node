[package]
name = "yggdrasil-cardano-cli"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream cardano-cli operator-tooling surface."

# Mirrors upstream `cardano-cli/cardano-cli/cardano-cli.cabal` library
# component. Maintains 1:1 file-mirror parity with
# `Cardano.CLI.{Command,Run,Parser,Render,Option,Helper,Environment,Orphan}`
# plus the per-era / Compatible / Byron sub-trees populated in R290–R295.

[lints]
workspace = true

[dependencies]
clap = { workspace = true }
eyre = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

# Standalone binary target. Operators install via:
#   cargo install --path crates/tools/cardano-cli
# This produces a `yggdrasil-cardano-cli` binary on `$PATH`.
# Today's coverage is: `version` (fully wired), `show-upstream-
# config` and `query-tip` (emit structured deferral messages —
# use the node binary's wrapper for now). Full surface migration
# tracked in docs/TECH-DEBT.md.
[[bin]]
name = "yggdrasil-cardano-cli"
path = "src/main.rs"
