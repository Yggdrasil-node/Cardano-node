[package]
name = "yggdrasil-snapshot-converter"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream snapshot-converter ledger snapshot format converter (mem ↔ lmdb ↔ lsm)."

# R327 skeleton — bootstrap of the snapshot-converter sister-tool crate per the
