[lints]
workspace = true

[lib]
name = "yggdrasil_snapshot_converter"
path = "src/lib.rs"

[[bin]]
name = "snapshot-converter"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
eyre = { workspace = true }
yggdrasil-telemetry.workspace = true
thiserror = { workspace = true }
