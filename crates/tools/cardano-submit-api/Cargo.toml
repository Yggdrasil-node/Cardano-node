[package]
name = "yggdrasil-cardano-submit-api"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false
description = "Pure-Rust port of the upstream cardano-submit-api HTTP transaction-submission service."

# R327 skeleton — bootstrap of the cardano-submit-api sister-tool crate per the
# R326–R459 sister-tools port arc plan.
# Upstream source vendored at:
# .reference-haskell-cardano-node/cardano-submit-api/

[lints]
workspace = true

[lib]
name = "yggdrasil_cardano_submit_api"
path = "src/lib.rs"

[[bin]]
name = "cardano-submit-api"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
eyre = { workspace = true }
hex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
yggdrasil-ledger.workspace = true
yggdrasil-network = { path = "../../network" }
yggdrasil-telemetry.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
