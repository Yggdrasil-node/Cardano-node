# ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Wave 3 PR 5 ‚Äî feature-flag declarations.
#
# Splitting `secp256k1` and `bls12-381` lets the Wave 9 PR 28
# cost-model fuzz harness compile out the BLS path (which dominates
# build time and is irrelevant to integer/bytestring builtin fuzzing)
# without touching the rest of the CEK machine.
#
# Both default-on; the default build is byte-identical to the
# pre-flag build.
#
# `secp256k1` (Phase 5.4 ‚Äî wired): gates the `evaluate_builtin`
# dispatch arms for `VerifyEcdsaSecp256k1Signature` /
# `VerifySchnorrSecp256k1Signature` + the `verify_*_secp256k1`
# helpers + the `yggdrasil_crypto::secp256k1` import. The
# `DefaultBuiltin` enum variants stay unconditional (wire-level
# flat tags 52/53); with the feature off, evaluation surfaces a
# `MachineError::BuiltinError` instead of dispatching the crypto.
#
# `bls12-381`: not yet `#[cfg]`-gated ‚Äî the BLS dispatch is an
# 18-arm block plus `get_g1` / `get_g2` helpers; gating it cleanly
# is a follow-on round.
# ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[features]
default = ["secp256k1", "bls12-381"]
secp256k1 = []
bls12-381 = []

[lints]
workspace = true
