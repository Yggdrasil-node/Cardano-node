version: 2
updates:
  # Cargo dependencies — weekly minor + patch updates.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      cargo-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # GitHub Actions — keep workflow action versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope

  # Docker base images.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"
      include: scope

  # Bundler (Jekyll docs site).
  - package-ecosystem: bundler
    directory: "/docs"
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docs
    commit-message:
      prefix: "chore(docs-deps)"
      include: scope
