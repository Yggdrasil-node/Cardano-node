name: Release

# Triggered on tags matching v* (e.g. v0.2.0, v1.0.0-rc1).
# Builds release binaries for Linux x86_64 + aarch64, computes SHA256 sums,
# generates auto-changelog notes, and publishes a GitHub Release.
#
# Manual dispatch is also available — runs the build but does NOT publish.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0). Leave blank for dry-run."
        required: false
        default: ""

permissions:
  contents: write
  # Wave 7 PR 19: required for keyless cosign signing via OIDC + SLSA
  # build-provenance attestation via actions/attest-build-provenance.
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Wave 7 PR 18 — musl targets land alongside gnu (additive),
        # not replacing them. Operators choose: gnu for the dynamic-libc
        # baseline (smaller binary; depends on the host's glibc), musl
        # for a fully-static binary (drop-in for any Linux distro,
        # including Alpine; required by IntersectMBO's cardano-node-tests
        # static-bin validation in upstream-cardano-node-tests.yml).
        #
        # Native runners are used throughout (no cargo-zigbuild yet);
        # the cross-compile via zigbuild swap is queued for a follow-on
        # PR once local cargo verification is available.
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive_suffix: linux-x86_64
            libc: gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_suffix: linux-aarch64
            libc: gnu
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive_suffix: linux-x86_64-musl
            libc: musl
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            archive_suffix: linux-aarch64-musl
            libc: musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      # Wave 7 PR 18: musl builds need musl-tools (musl-gcc + linker)
      # on Ubuntu. On the native-arm runner the package name is the same.
      - name: Install musl static-link tools
        if: matrix.libc == 'musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools file
          sudo rm -rf /var/lib/apt/lists/*

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      # Wave 7 PR 20 — reproducible-build environment.
      #
      # The release build SHOULD produce a byte-identical archive on
      # any runner given the same tag. Three sources of non-determinism
      # need pinning before that holds:
      #
      #   1. Embedded timestamps (rustc / cargo emit them by default).
      #      Pin via SOURCE_DATE_EPOCH set from the tag's commit time.
      #   2. Build-tree paths (rustc embeds them in debug + panic info).
      #      Pin via --remap-path-prefix mapping the runner cwd + the
      #      cargo registry dir to fixed virtual roots.
      #   3. The ELF build-id (linker emits a random one). Pin via
      #      -Clink-arg=-Wl,--build-id=none.
      #
      # repro-check.yml (this PR) re-builds each tag on a different
      # runner and diffs the archive byte-for-byte.
      - name: Configure reproducible-build env
        id: repro
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            [ -z "$tag" ] && tag="HEAD"
          fi
          # Use the tag's commit time (UTC seconds since epoch) so the
          # value is deterministic per tag, regardless of runner clock.
          source_date_epoch="$(git log -1 --format=%ct "$tag")"
          {
            echo "SOURCE_DATE_EPOCH=$source_date_epoch"
            # Map runtime paths to stable virtual roots so debug-info
            # doesn't capture runner-specific paths. /yggdrasil-src and
            # /yggdrasil-cargo are arbitrary but stable.
            echo "CARGO_BUILD_RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}=/yggdrasil-src --remap-path-prefix=${HOME}/.cargo=/yggdrasil-cargo -Clink-arg=-Wl,--build-id=none"
          } >> "$GITHUB_ENV"
          echo "[repro] SOURCE_DATE_EPOCH=$source_date_epoch (tag $tag)"

      # Wave 7 PR 19: cargo-auditable embeds the dependency manifest
      # into the shipped binary so operators can run
      # `cargo audit bin yggdrasil-node` after a future RUSTSEC advisory
      # without rebuilding the whole tree.
      - name: Install cargo-auditable + cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-auditable,cargo-cyclonedx

      - name: Build release binary (cargo-auditable)
        run: cargo auditable build --release --bin yggdrasil-node --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          # Wave 7 PR 18: every matrix entry uses a native-arch runner
          # (no cross-compile yet), so vanilla `strip` works for all
          # four targets. The legacy cross-strip arm of this script
          # (binutils-aarch64-linux-gnu) was needed when the aarch64
          # build ran on an x86_64 runner; today both gnu+musl aarch64
          # use ubuntu-24.04-arm.
          strip target/${{ matrix.target }}/release/yggdrasil-node
          file target/${{ matrix.target }}/release/yggdrasil-node

      # Wave 7 PR 19: CycloneDX-JSON SBOM per arch. The shipped tarball
      # bundles its own SBOM so operators can run dependency-CVE scans
      # against the exact artifacts they downloaded without trusting
      # the cargo-auditable manifest alone.
      - name: Generate CycloneDX SBOM
        id: sbom
        run: |
          set -euo pipefail
          cargo cyclonedx --format json --target-only --target ${{ matrix.target }}
          # cargo-cyclonedx emits to per-crate paths. Aggregate the
          # binary crate's SBOM into a single top-level artifact
          # named for the release archive.
          sbom_src="crates/node/yggdrasil-node/yggdrasil-node.cdx.json"
          if [ ! -f "$sbom_src" ]; then
            # Fallback for older cargo-cyclonedx layout.
            sbom_src="$(find . -name 'yggdrasil-node*.cdx.json' -not -path './target/*' | head -1)"
          fi
          if [ -z "$sbom_src" ] || [ ! -f "$sbom_src" ]; then
            echo "::error::cargo-cyclonedx did not produce a yggdrasil-node SBOM"
            exit 1
          fi
          echo "sbom_src=$sbom_src" >> "$GITHUB_OUTPUT"
          echo "[sbom] $sbom_src ($(wc -c < "$sbom_src") bytes)"

      - name: Stage release artifacts
        id: stage
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            [ -z "$tag" ] && tag="dryrun-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          dir="yggdrasil-node-${tag}-${{ matrix.archive_suffix }}"
          mkdir -p "$dir"

          cp target/${{ matrix.target }}/release/yggdrasil-node "$dir/"
          cp README.md LICENSE* "$dir/" 2>/dev/null || true
          # Wave 4 PR 6 follow-up: post-move paths.
          cp -r crates/node/yggdrasil-node/configuration "$dir/configuration"
          cp -r crates/node/yggdrasil-node/scripts "$dir/scripts"
          # Wave 7 PR 19: bundle the SBOM alongside the binary so
          # operators get the dep manifest in-tree.
          cp "${{ steps.sbom.outputs.sbom_src }}" "$dir/yggdrasil-node-sbom.cdx.json"

          # Wave 7 PR 20: deterministic tar — strip mtime + ownership
          # variation so two runners building the same tag produce the
          # same archive bytes. SOURCE_DATE_EPOCH was set in the
          # `Configure reproducible-build env` step.
          tar --sort=name \
              --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              -czf "${dir}.tar.gz" "$dir"
          sha256sum "${dir}.tar.gz" > "${dir}.tar.gz.sha256"
          # Wave 7 PR 19: also emit the SBOM as a separate signed
          # artifact for operators that prefer to verify it independently.
          cp "${{ steps.sbom.outputs.sbom_src }}" "${dir}-sbom.cdx.json"

          echo "archive=${dir}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${dir}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "sbom=${dir}-sbom.cdx.json" >> "$GITHUB_OUTPUT"
          echo "dir=${dir}" >> "$GITHUB_OUTPUT"

      # Wave 7 PR 19: SLSA L3 build-provenance attestation. The
      # `predicate_type` is `https://slsa.dev/provenance/v1`; operators
      # verify via `gh attestation verify <archive> --repo <repo>` or
      # `slsa-verifier`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.sbom }}

      # Wave 7 PR 19: cosign keyless signing via the workflow's OIDC
      # token. Each archive + SBOM gets a `.sig` + `.crt` pair.
      # Verification recipe: see docs/manual/release-verification.md.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign archive + SBOM (cosign keyless)
        run: |
          set -euo pipefail
          for path in "${{ steps.stage.outputs.archive }}" "${{ steps.stage.outputs.sbom }}"; do
            cosign sign-blob --yes \
              --output-signature "${path}.sig" \
              --output-certificate "${path}.crt" \
              "$path"
            echo "[cosign] signed $path"
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: yggdrasil-node-${{ matrix.archive_suffix }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.archive }}.sig
            ${{ steps.stage.outputs.archive }}.crt
            ${{ steps.stage.outputs.checksum }}
            ${{ steps.stage.outputs.sbom }}
            ${{ steps.stage.outputs.sbom }}.sig
            ${{ steps.stage.outputs.sbom }}.crt
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for changelog generation)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \
            \( -name "*.tar.gz" -o -name "*.sha256" \
               -o -name "*.sig" -o -name "*.crt" \
               -o -name "*.cdx.json" \) \
            -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Aggregate SHA256 checksums + sign aggregate
        run: |
          set -euo pipefail
          cd release-assets
          cat *.sha256 > SHA256SUMS.txt
          echo "Aggregated checksums:"
          cat SHA256SUMS.txt

      - name: Install cosign (aggregate signing)
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS.txt (cosign keyless)
        run: |
          set -euo pipefail
          cd release-assets
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.crt \
            SHA256SUMS.txt
          echo "[cosign] signed SHA256SUMS.txt"

      - name: Compute previous tag
        id: prev_tag
        run: |
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || echo "")
          echo "prev=$prev" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          prev="${{ steps.prev_tag.outputs.prev }}"
          {
            echo "## Yggdrasil ${tag}"
            echo ""
            if [ -n "$prev" ]; then
              echo "Changes since ${prev}:"
              echo ""
              echo "<details>"
              echo "<summary>Commit log</summary>"
              echo ""
              git log --no-merges --pretty=format:"- %s (%h)" "${prev}..${tag}"
              echo ""
              echo "</details>"
            else
              echo "Initial release."
            fi
            echo ""
            echo "## Binaries"
            echo ""
            echo "| Platform | Archive |"
            echo "|---|---|"
            for f in release-assets/*.tar.gz; do
              base=$(basename "$f")
              echo "| ${base#yggdrasil-node-${tag}-} | \`${base}\` |"
            done
            echo ""
            echo "Verify integrity (checksums):"
            echo ""
            echo '```'
            echo "sha256sum -c SHA256SUMS.txt"
            echo '```'
            echo ""
            echo "Verify signature (cosign keyless via Sigstore):"
            echo ""
            echo '```'
            echo "cosign verify-blob \\"
            echo "  --certificate <archive>.tar.gz.crt \\"
            echo "  --signature <archive>.tar.gz.sig \\"
            echo "  --certificate-identity-regexp '^https://github\\.com/${{ github.repository }}/' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  <archive>.tar.gz"
            echo '```'
            echo ""
            echo "Verify build provenance (SLSA L3 attestation):"
            echo ""
            echo '```'
            echo "gh attestation verify <archive>.tar.gz --repo ${{ github.repository }}"
            echo '```'
            echo ""
            echo "Verify embedded dependency manifest (cargo-auditable):"
            echo ""
            echo '```'
            echo "cargo install cargo-audit"
            echo "tar -xzf <archive>.tar.gz"
            echo "cargo audit bin yggdrasil-node-*/yggdrasil-node"
            echo '```'
            echo ""
            echo "Full verification recipe: [docs/manual/release-verification.md](https://github.com/${{ github.repository }}/blob/${tag}/docs/manual/release-verification.md)"
            echo ""
            echo "## Documentation"
            echo ""
            echo "- [User Manual](https://yggdrasil-node.github.io/Cardano-node/manual/)"
            echo "- [Installation](https://yggdrasil-node.github.io/Cardano-node/manual/installation/)"
            echo "- [Quick Start](https://yggdrasil-node.github.io/Cardano-node/manual/quick-start/)"
            echo "- [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${tag}/CHANGELOG.md)"
          } > release-notes.md
          echo "Generated release notes:"
          cat release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          # Wave 7 PR 19: the release surface now includes per-archive
          # cosign signature + certificate, the CycloneDX SBOM (and its
          # own signature/cert), and the signed aggregate checksum file.
          # SLSA build-provenance attestations are stored separately via
          # GitHub's attestation API (verify with `gh attestation verify`).
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sig
            release-assets/*.tar.gz.crt
            release-assets/*.sha256
            release-assets/*.cdx.json
            release-assets/*.cdx.json.sig
            release-assets/*.cdx.json.crt
            release-assets/SHA256SUMS.txt
            release-assets/SHA256SUMS.txt.sig
            release-assets/SHA256SUMS.txt.crt
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false
          token: ${{ secrets.GITHUB_TOKEN }}
