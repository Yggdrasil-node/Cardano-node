name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check-all

      - name: Test workspace
        run: cargo test-all

      - name: Lint workspace
        run: cargo lint

      # Strict-mirror drift-guard (R275: warn-only; R288: fail-build).
      # Counterpart to .claude/skills/round-extraction/SKILL.md (the
      # authoring-time guard). Walks production .rs files, looks each
      # up against the upstream basename index at
      # docs/upstream-haskell-files.txt, and flags any file with neither
      # an upstream `.hs` mirror nor a `## Naming parity` docstring
      # stanza. The committed docs/strict-mirror-audit.tsv is the
      # allowlist; only NEW violations are reported.
      #
      # Warn-only initially: emits ::warning:: lines but exits 0 so
      # Phase B (R276-R281) rounds can land their fixes without red CI.
      # R288 flips this to fail-build by passing --fail-on-violation.
      - name: Strict-mirror drift-guard (warn-only)
        run: python3 scripts/check-strict-mirror.py
        continue-on-error: true

  # cargo-deny gate — supply-chain hygiene.  Surfaces unmaintained,
  # vulnerable, or copyleft transitive dependencies as a CI failure.
  # Audit finding L-4.
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources