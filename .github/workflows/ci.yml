name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pin to the same toolchain that rust-toolchain.toml declares
      # (1.95.0). Using `@stable` here would silently drift CI ahead of
      # the workspace MSRV declared in [workspace.package].rust-version
      # and miss MSRV regressions.
      - name: Install Rust toolchain (pinned to rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check-all

      # cargo-nextest is the test runner. The `ci` profile is defined
      # in `.config/nextest.toml` (Wave 9 PR 25) and tunes the slow-
      # timeout for CI hardware (120s × terminate-after 3 = 360s
      # ceiling, vs the local default's 60s × 2 = 120s) so heavy
      # config-validation tests like
      # `vendored_network_presets_produce_only_environmental_warnings`
      # (which loads + validates all three genesis bundles, taking
      # ~30s locally / ~120s+ on CI runners) don't trip the local-
      # tuned timeout when the workflow runs them.
      - name: Test workspace
        run: cargo nextest run --workspace --all-features --no-fail-fast --profile ci

      - name: Lint workspace
        run: cargo lint

      # Catch feature-gated breakage early — code under
      # `#[cfg(feature = "...")]` that doesn't compile with default
      # features off would otherwise only surface when an operator
      # builds a relay-only / slim variant.
      - name: Lint workspace (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

      # Feature-combination matrix (Phase 5.4). The blanket
      # `--no-default-features` check above turns *every* crate's
      # flags off simultaneously — it never exercises an intermediate
      # combination, so a regression that breaks the
      # `secp256k1`-on / `bls12-381`-off build (or vice versa) would
      # slip through. `yggdrasil-plutus` is the crate carrying
      # genuinely-wired `#[cfg(feature)]` gates (Phase 5.4: secp256k1
      # + bls12-381 dispatch-gating); this step pins every individual
      # combination compiling + its tests passing. `--all-targets`
      # so the gated unit tests are covered too.
      - name: Verify yggdrasil-plutus feature combinations
        run: |
          set -euxo pipefail
          # Neither crypto flag — both dispatch paths gated off.
          cargo nextest run -p yggdrasil-plutus --no-default-features --profile ci
          # secp256k1 only — bls12-381 dispatch gated off.
          cargo nextest run -p yggdrasil-plutus --no-default-features \
            --features secp256k1 --profile ci
          # bls12-381 only — secp256k1 dispatch gated off.
          cargo nextest run -p yggdrasil-plutus --no-default-features \
            --features bls12-381 --profile ci

      # Strict-mirror drift-guard (fifth verification gate).
      # Counterpart to .claude/skills/round-extraction/SKILL.md (the
      # authoring-time guard). Walks production .rs files, looks each
      # up against the upstream basename index at
      # docs/upstream-haskell-files.txt, and flags any file with neither
      # an upstream `.hs` mirror nor a `## Naming parity` docstring
      # stanza. The committed docs/strict-mirror-audit.tsv is the
      # allowlist; only NEW violations are reported.
      #
      # R275 landed this in warn-only mode (continue-on-error: true)
      # to let Phase B (R276-R281) close existing violations without
      # red CI. R281 closed the last (b)/(d) row in the audit table.
      # R288 (this round) flips to fail-build via --fail-on-violation:
      # any new file lacking an upstream mirror or `## Naming parity`
      # docstring stanza fails the build.
      - name: Strict-mirror drift-guard
        run: python3 scripts/check-strict-mirror.py --fail-on-violation

      # Fetch upstream Haskell source trees only (no 870 MB install
      # tarball). Required by the parity-matrix validator below, which
      # asserts every `haskell_reference[*].path` exists on disk under
      # `.reference-haskell-cardano-node/deps/`. The full install tree
      # is local-only (see check-reference-artifacts.py).
      - name: Fetch upstream Haskell reference sources
        run: bash scripts/setup-reference.sh --sources-only

      # Parity-matrix path/schema validator.
      # Walks docs/parity-matrix.json and asserts every entry's
      # `haskell_reference[*].path` and `rust_surface[*].path` exists
      # on disk + every status / area / milestone is in the allowed
      # set. Required when matrix entries change; cheap to run on
      # every CI build.
      - name: Parity-matrix validator
        run: python3 scripts/check-parity-matrix.py

      # Wave 10 PR 30 — JSON Schema gate for parity-matrix.json.
      # Catches editor / hand-edit errors that pass the Python
      # validator's path-existence check but break the schema
      # (e.g. wrong status enum, missing required field, malformed
      # haskell_reference list). Schema lives at
      # docs/parity-matrix.schema.json; bump its `schema_version`
      # const alongside any JSON shape change.
      - name: Parity-matrix schema gate
        run: |
          python3 -m pip install --quiet check-jsonschema
          check-jsonschema --schemafile docs/parity-matrix.schema.json docs/parity-matrix.json

      # Fixture-manifest validator. Cross-checks the cardano-base
      # SHA pin across `crates/node/yggdrasil-node/src/upstream_pins.rs::UPSTREAM_CARDANO_BASE_COMMIT`,
      # `specs/upstream-test-vectors/cardano-base/<SHA>/`,
      # `docs/SPECS.md`, and `docs/UPSTREAM_PARITY.md`. Asserts every
      # required upstream-vendored fixture corpus is present.
      - name: Fixture-manifest validator
        run: python3 scripts/check-fixture-manifest.py

      # Reference-artifacts validator runs locally only:
      # `scripts/check-reference-artifacts.py` requires the vendored
      # `.reference-haskell-cardano-node/install/` tree (~1.3 GB,
      # rebuilt by `bash scripts/setup-reference.sh`). CI does not
      # carry the install tree; operators run the check before parity
      # rehearsals.

  # cargo-deny gate — supply-chain hygiene.  Surfaces unmaintained,
  # vulnerable, or copyleft transitive dependencies as a CI failure.
  # Audit finding L-4.
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources