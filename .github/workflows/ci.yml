name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check-all

      - name: Test workspace
        run: cargo test-all

      - name: Lint workspace
        run: cargo lint

      # Strict-mirror drift-guard (fifth verification gate).
      # Counterpart to .claude/skills/round-extraction/SKILL.md (the
      # authoring-time guard). Walks production .rs files, looks each
      # up against the upstream basename index at
      # docs/upstream-haskell-files.txt, and flags any file with neither
      # an upstream `.hs` mirror nor a `## Naming parity` docstring
      # stanza. The committed docs/strict-mirror-audit.tsv is the
      # allowlist; only NEW violations are reported.
      #
      # R275 landed this in warn-only mode (continue-on-error: true)
      # to let Phase B (R276-R281) close existing violations without
      # red CI. R281 closed the last (b)/(d) row in the audit table.
      # R288 (this round) flips to fail-build via --fail-on-violation:
      # any new file lacking an upstream mirror or `## Naming parity`
      # docstring stanza fails the build.
      - name: Strict-mirror drift-guard
        run: python3 scripts/check-strict-mirror.py --fail-on-violation

      # Parity-matrix path/schema validator.
      # Walks docs/parity-matrix.json and asserts every entry's
      # `haskell_reference[*].path` and `rust_surface[*].path` exists
      # on disk + every status / area / milestone is in the allowed
      # set. Required when matrix entries change; cheap to run on
      # every CI build.
      - name: Parity-matrix validator
        run: python3 scripts/check-parity-matrix.py

      # Fixture-manifest validator. Cross-checks the cardano-base
      # SHA pin across `node/src/upstream_pins.rs::UPSTREAM_CARDANO_BASE_COMMIT`,
      # `specs/upstream-test-vectors/cardano-base/<SHA>/`,
      # `docs/SPECS.md`, and `docs/UPSTREAM_PARITY.md`. Asserts every
      # required upstream-vendored fixture corpus is present.
      - name: Fixture-manifest validator
        run: python3 scripts/check-fixture-manifest.py

      # Reference-artifacts validator runs locally only:
      # `scripts/check-reference-artifacts.py` requires the vendored
      # `.reference-haskell-cardano-node/install/` tree (~1.3 GB,
      # rebuilt by `bash scripts/setup-reference.sh`). CI does not
      # carry the install tree; operators run the check before parity
      # rehearsals.

  # cargo-deny gate — supply-chain hygiene.  Surfaces unmaintained,
  # vulnerable, or copyleft transitive dependencies as a CI failure.
  # Audit finding L-4.
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources