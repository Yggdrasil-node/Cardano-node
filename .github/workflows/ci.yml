name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check-all

      - name: Test workspace
        run: cargo test-all

      - name: Lint workspace
        run: cargo lint

  # cargo-deny gate — supply-chain hygiene.  Surfaces unmaintained,
  # vulnerable, or copyleft transitive dependencies as a CI failure.
  # Audit finding L-4.
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources