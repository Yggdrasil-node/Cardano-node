name: Coverage

# Non-gating coverage reporter.  Runs cargo-llvm-cov over the workspace
# on every push and PR, uploads LCOV to Codecov.  Never fails the
# build — coverage is a signal, not a gate.  Runs in parallel with
# `CI` so the main rust job remains the source of truth for pass/fail.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.95.0 (workspace MSRV)
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Generate LCOV
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
